import groovy.json.JsonSlurper

pluginManagement {
  def reactNativeGradlePlugin = new File(
    providers.exec {
      workingDir(rootDir)
      commandLine("node", "--print", "require.resolve('@react-native/gradle-plugin/package.json', { paths: [require.resolve('react-native/package.json')] })")
    }.standardOutput.asText.get().trim()
  ).getParentFile().absolutePath
  includeBuild(reactNativeGradlePlugin)
  
  def expoPluginsPath = new File(
    providers.exec {
      workingDir(rootDir)
      commandLine("node", "--print", "require.resolve('expo-modules-autolinking/package.json', { paths: [require.resolve('expo/package.json')] })")
    }.standardOutput.asText.get().trim(),
    "../android/expo-gradle-plugin"
  ).absolutePath
  includeBuild(expoPluginsPath)
}

plugins {
  id("com.facebook.react.settings")
  id("expo-autolinking-settings")
}

extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
  if (System.getenv('EXPO_USE_COMMUNITY_AUTOLINKING') == '1') {
    ex.autolinkLibrariesFromCommand()
  } else {
    ex.autolinkLibrariesFromCommand(expoAutolinking.rnConfigCommand)
  }
}
expoAutolinking.useExpoModules()

rootProject.name = 'Sylana Vessel'

expoAutolinking.useExpoVersionCatalog()

include ':app'

def sanitizeAutolinkProjectName(String dependencyName) {
  dependencyName.replace("@", "").replace("/", "_")
}

def wireAutolinkedReactNativeProjects() {
  def autolinkingFile = file("build/generated/autolinking/autolinking.json")
  if (!autolinkingFile.exists()) {
    return
  }

  def autolinking = new JsonSlurper().parse(autolinkingFile)
  autolinking.dependencies.each { dependencyName, dependencyConfig ->
    if (dependencyName == "expo" || dependencyName.startsWith("expo-")) {
      return
    }

    def androidConfig = dependencyConfig?.platforms?.android
    def sourceDir = androidConfig?.sourceDir
    if (!sourceDir) {
      return
    }

    def projectName = ":${sanitizeAutolinkProjectName(dependencyName)}"
    if (findProject(projectName) == null) {
      include(projectName)
    }
    project(projectName).projectDir = file(sourceDir)
  }
}

wireAutolinkedReactNativeProjects()

def includeWearApp = System.getenv("ENABLE_WEAR_APP") == "1" || gradle.startParameter.projectProperties.get("enableWearApp") == "true"
if (includeWearApp) {
  include ':wear'
}
includeBuild(expoAutolinking.reactNativeGradlePlugin)
